<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ChatGPT</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-top">
        <button class="new-chat-btn" id="newChatBtn">
          <span>＋</span> New chat
        </button>
      </div>

      <div class="sidebar-section-label">Chat history</div>
      <div class="chat-history" id="chatHistory"></div>

      <div class="sidebar-footer">
        <div class="user-pill">
          <div class="avatar" id="userAvatar">?</div>
          <div class="name" id="userName">…</div>
        </div>
        <button class="logout-btn" id="logoutBtn">Log out</button>
      </div>
    </aside>

    <main class="chat-main">
      <div class="chat-topbar">
        <button class="menu-btn" id="menuBtn">☰</button>
        <span id="topbarTitle">ChatGPT</span>
      </div>

      <div class="connection-banner" id="connectionBanner">
        Reconnecting to the server…
      </div>

      <div class="chat-scroll" id="chatScroll">
        <div class="chat-messages" id="chatMessages">
          <div class="welcome" id="welcomeState">
            <div class="mark">C</div>
            <h2>Ready when you are.</h2>
            <p>Start a new chat or pick up a previous conversation from the sidebar.</p>
          </div>
        </div>
      </div>

      <div class="composer-wrap">
        <form class="composer" id="composerForm">
          <textarea
            id="messageInput"
            placeholder="Message the assistant…"
            rows="1"
            required
          ></textarea>
          <button type="submit" class="send-btn" id="sendBtn" disabled>↑</button>
        </form>
        <div class="composer-hint">Press Enter to send, Shift+Enter for a new line</div>
      </div>
    </main>
  </div>

  <script src="https://chatgpt-clone-qi03.onrender.com/socket.io/socket.io.js"></script>
  <script src="js/config.js"></script>
  <script src="js/chat.js"></script>
</body>
</html>
