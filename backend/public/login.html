<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Log in</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="auth-screen">
    <div class="auth-card">
      <div class="auth-brand">
        <div class="mark">C</div>
        <span>ChatGPT</span>
      </div>
      <h1>Welcome back</h1>
      <p class="sub">Log in to continue your conversations</p>

      <div class="error-banner" id="errorBanner"></div>

      <form id="loginForm" class="auth-card" style="gap: 16px;">
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" required autocomplete="email" placeholder="you@example.com" />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" required autocomplete="current-password" placeholder="••••••••" />
        </div>
        <button type="submit" class="btn-primary" id="submitBtn">Log in</button>
      </form>

      <div class="auth-switch">
        Don't have an account? <a href="register.html">Sign up</a>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
