<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sign up</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="auth-screen">
    <div class="auth-card">
      <div class="auth-brand">
        <div class="mark">C</div>
        <span>ChatGPT</span>
      </div>
      <h1>Create your account</h1>
      <p class="sub">Start chatting with ChatGPT</p>

      <div class="error-banner" id="errorBanner"></div>

      <form id="registerForm" class="auth-card" style="gap: 16px;">
        <div class="field-row">
          <div class="field">
            <label for="firstName">First name</label>
            <input type="text" id="firstName" required autocomplete="given-name" placeholder="Jane" />
          </div>
          <div class="field">
            <label for="lastName">Last name</label>
            <input type="text" id="lastName" required autocomplete="family-name" placeholder="Doe" />
          </div>
        </div>
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" required autocomplete="email" placeholder="you@example.com" />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" required autocomplete="new-password" placeholder="••••••••" />
        </div>
        <button type="submit" class="btn-primary" id="submitBtn">Sign up</button>
      </form>

      <div class="auth-switch">
        Already have an account? <a href="login.html">Log in</a>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
